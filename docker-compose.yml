version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "5005:5005"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  admin:
    build:
      context: ./admin
    ports:
      - "5174:5174"
    env_file:
      - ./admin/.env
    volumes:
      - ./admin:/app
      - /app/node_modules
    depends_on:
      - backend
